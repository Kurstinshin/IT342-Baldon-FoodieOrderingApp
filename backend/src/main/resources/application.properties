# ─── Local / Production PostgreSQL ───────────────────────────────────────────
# On Render these env vars are injected automatically.
# For local dev, either fill in the real Render DB values below
# OR start a local PostgreSQL and point to it.
spring.datasource.url=jdbc:postgresql://${DB_HOST:dpg-xxxxx.singapore-postgres.render.com}:${DB_PORT:5432}/${DB_NAME:foodie_tlxs}
spring.datasource.username=${DATABASE_USERNAME:foodie_tlxs_user}
spring.datasource.password=${DATABASE_PASSWORD:YOUR_REAL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false